snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20' # Updated to 20

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # ── Dependency Scan ──
      - name: Snyk Dependency Scan
        run: snyk test --severity-threshold=high --sarif-file-output=snyk-deps.sarif
        continue-on-error: true # Allows the next scan to run even if this fails

      # ── Code Scan ──
      - name: Snyk Code Scan
        run: snyk code test --severity-threshold=high --sarif-file-output=snyk-code.sarif
        continue-on-error: true

      # ── IaC Scan ──
      - name: Snyk IaC Scan
        run: snyk iac test --sarif-file-output=snyk-iac.sarif
        continue-on-error: true

      # ── Upload Results (With existence checks) ──
      - name: Upload Snyk Dependencies
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies
        continue-on-error: true

      - name: Upload Snyk Code
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
        continue-on-error: true

      - name: Upload Snyk IaC
        if: always()
        run: |
          if [ -f snyk-iac.sarif ]; then
            echo "Uploading IaC SARIF..."
          else
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"snyk-iac"}},"results":[]}]}' > snyk-iac.sarif
          fi

      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac

      # ── Final Failure Step ──
      # This step ensures the workflow turns RED if any of the scans found issues
      - name: Check for vulnerabilities
        if: always()
        run: |
          if grep -q '"results":\[{' snyk-deps.sarif || grep -q '"results":\[{' snyk-code.sarif; then
            echo "Vulnerabilities found! Failing workflow."
            exit 1
          fi
