name: Unified Security Scan (Final)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:
# ─────────────────────────────────────────────
# 🔍 TFLint
# ─────────────────────────────────────────────
  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: ${{ runner.os }}-tflint-${{ hashFiles('.tflint.hcl') }}

      - uses: terraform-linters/setup-tflint@v4

      - run: tflint --init

      - name: Run TFLint
        # Removed || true so it fails on linting errors
        run: tflint --format sarif > tflint.sarif

      - name: Upload TFLint SARIF
        # Use always() so the report uploads even if linting failed
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tflint.sarif
          category: tflint

# ─────────────────────────────────────────────
# 🔐 Checkov
# ─────────────────────────────────────────────
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: .
          # Checkov action fails the build by default if errors are found

      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: checkov

# ─────────────────────────────────────────────
# 🧪 Snyk (ALL-IN-ONE)
# ─────────────────────────────────────────────
  snyk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci || npm install # Fallback if lockfile is missing

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      # ── Dependency Scan ──
      - name: Snyk Dependency Scan
        # Removed || true. Fails if high-severity vulns are found.
        run: snyk test --severity-threshold=high --sarif-file-output=snyk-deps.sarif

      # ── Code Scan ──
      - name: Snyk Code Scan
        # Removed || true. This will catch your Command Injection and FAIL the job.
        run: snyk code test --severity-threshold=high --sarif-file-output=snyk-code.sarif

      # ── IaC Scan ──
      - name: Snyk IaC Scan
        run: snyk iac test --sarif-file-output=snyk-iac.sarif

      # ── Upload Results ──
      # We use 'if: always()' so that even if Snyk Code fails, the reports are still sent to GitHub Security tab
      - name: Upload Snyk Dependencies
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-dependencies

      - name: Upload Snyk Code
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Upload Snyk IaC
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac
