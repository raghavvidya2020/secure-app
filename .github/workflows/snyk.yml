name: Unified Security Scan (Snyk-Based)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

jobs:

# ─────────────────────────────────────────────
# 🔍 TFLint
# ─────────────────────────────────────────────
  tflint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.tflint.d/plugins
          key: ${{ runner.os }}-tflint-${{ hashFiles('.tflint.hcl') }}

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93

      - run: tflint --init

      - run: tflint --format sarif > tflint.sarif || true

      - name: Fix SARIF
        run: |
          if [ ! -s tflint.sarif ]; then
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"tflint"}},"results":[]}]}' > tflint.sarif
          fi

      - uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        if: success() || failure()
        with:
          sarif_file: tflint.sarif

# ─────────────────────────────────────────────
# 🔐 Checkov
# ─────────────────────────────────────────────
  checkov:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: .

      - name: Normalize SARIF
        run: |
          FILE=$(ls *.sarif 2>/dev/null | head -n 1)
          if [ -n "$FILE" ]; then
            mv "$FILE" checkov.sarif
          else
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"checkov"}},"results":[]}]}' > checkov.sarif
          fi

      - uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        if: success() || failure()
        with:
          sarif_file: checkov.sarif

# ─────────────────────────────────────────────
# 🧪 Snyk (All-in-One Replacement)
# ─────────────────────────────────────────────
  snyk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci || true

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Authenticate
        run: snyk auth $SNYK_TOKEN

      # ── Dependency Scan ──
      - name: Snyk Dependency Scan
        run: snyk test --severity-threshold=high --sarif-file-output=snyk-deps.sarif || true

      # ── Code Scan ──
      - name: Snyk Code Scan
        run: snyk code test --severity-threshold=high --sarif-file-output=snyk-code.sarif || true

      # ── IaC Scan ──
      - name: Snyk IaC Scan
        run: snyk iac test --sarif-file-output=snyk-iac.sarif || true

      # ── Fix SARIF ──
      - name: Fix SARIF files
        run: |
          for file in snyk-deps.sarif snyk-code.sarif snyk-iac.sarif; do
            if [ ! -s "$file" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"snyk"}},"results":[]}]}' > $file
            fi
          done

      # ── Upload Results ──
      - uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        if: success() || failure()
        with:
          sarif_file: snyk-deps.sarif

      - uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        if: success() || failure()
        with:
          sarif_file: snyk-code.sarif

      - uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        if: success() || failure()
        with:
          sarif_file: snyk-iac.sarif
