name: Unified Security Scan (Final)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
# ─────────────────────────────────────────────
# 🛡️ Secret Scanning (Gitleaks Filesystem Scan)
# ─────────────────────────────────────────────
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (Full Repo Scan)
        # We use the Docker version to bypass the Action's "smart" commit filtering
        # This forces it to look at the actual files on the disk (like secure.txt)
        run: |
          docker run -v ${{ github.workspace }}:/path zricethezav/gitleaks:latest \
          detect --source="/path" \
          --report-format=sarif \
          --report-path="/path/results.sarif" \
          --exit-code=0 \
          --no-git \
          --verbose

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

# ─────────────────────────────────────────────
# 🔍 Infrastructure as Code (TFLint & Checkov)
# ─────────────────────────────────────────────
  terraform-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init
      - name: Run TFLint
        run: tflint --format sarif > tflint.sarif || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"tflint"}},"results":[]}]}' > tflint.sarif

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: .
        continue-on-error: true

      - name: Upload TFLint
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tflint.sarif
          category: tflint

      - name: Upload Checkov
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: checkov

# ─────────────────────────────────────────────
# 🧪 Application Security (Snyk)
# ─────────────────────────────────────────────
  snyk-security:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Snyk and Scan
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          # Create lockfile if missing for Snyk
          npm ci || npm install --package-lock-only || true
          snyk test --severity-threshold=high --sarif-file-output=snyk-deps.sarif || true
          snyk code test --severity-threshold=high --sarif-file-output=snyk-code.sarif || true

      - name: Prepare SARIF files
        if: always()
        run: |
          for file in snyk-deps.sarif snyk-code.sarif; do
            if [ ! -f "$file" ]; then
              echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"snyk"}},"results":[]}]}' > "$file"
            fi
          done

      - name: Upload Snyk Results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-deps

      - name: Upload Snyk Code
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
