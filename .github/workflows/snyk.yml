name: Snyk Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  snyk-dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pinned

      - name: Setup Node.js
        uses: actions/setup-node@64ed1c9c4c5b0c1c8f1a8b48f2b9e7e6c5b6b6f3 # pinned
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Run Snyk dependency test (SARIF)
        run: snyk test --severity-threshold=high --sarif-file-output=snyk-deps.sarif

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          sarif_file: snyk-deps.sarif

  snyk-code-scan:
    name: Code Scan (SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Snyk Code scan (SARIF)
        run: snyk code test --severity-threshold=high --sarif-file-output=snyk-code.sarif

      - name: Upload SARIF
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          sarif_file: snyk-code.sarif

  snyk-monitor:
    name: Monitor Project
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [snyk-dependency-scan, snyk-code-scan]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node.js
        uses: actions/setup-node@64ed1c9c4c5b0c1c8f1a8b48f2b9e7e6c5b6b6f3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Monitor with Snyk
        run: snyk monitor
