name: Build, Scan, and Push Nginx Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: my-nginx
      IMAGE_TAG: latest
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Nginx Docker image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Install Snyk CLI
        run: |
          npm install -g snyk

      - name: Authenticate Snyk
        run: |
          snyk auth $SNYK_TOKEN

      - name: Scan Docker image with Snyk
        run: |
          snyk container test $IMAGE_NAME:$IMAGE_TAG
          
      - name: Log in to Docker Hub
        if: success()  # Only run if previous steps succeed
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_PASSWORD }}

      - name: Push Docker image to Docker Hub
        if: success()  # Only push if Snyk scan passed
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
          docker push $DOCKERHUB_USERNAME/$IMAGE_NAME:$IMAGE_TAG
